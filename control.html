<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
background:#1e1e1e;
color:#e6e6e6;
font-family:sans-serif;
margin:40px;
display:flex;
}

.version{
width:18px;
height:18px;
border-radius:50%;
background:#666;
margin-right:20px;
margin-top:5px;
}

.container{
flex:1;
}

.preview{
width:854px;
height:480px;
border:4px solid white;
margin:auto;
overflow:hidden;
}

iframe{
width:1920px;
height:1080px;
transform:scale(0.444);
transform-origin:top left;
border:none;
}

/* BOTONES PREVIEW */

.previewButtons{
width:854px;
margin:15px auto 0 auto;
display:flex;
gap:10px;
justify-content:center;
}

.previewButtons button{
background:#2e2e2e;
color:white;
border:none;
padding:8px 14px;
cursor:pointer;
border-radius:4px;
}

.previewButtons button:hover{
background:#3d3d3d;
}

/* PANEL BANNERS */

.panel{
width:854px;
margin:auto;
margin-top:30px;
}

.item{
display:flex;
align-items:center;
justify-content:space-between;
margin:10px 0;
background:#2a2a2a;
padding:10px;
border-radius:6px;
}

.item span{
flex:1;
margin-left:12px;
font-size:14px;
}

/* SWITCH */

.switch{
position:relative;
display:inline-block;
width:42px;
height:22px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#555;
transition:.3s;
border-radius:22px;
}

.slider:before{
position:absolute;
content:"";
height:16px;
width:16px;
left:3px;
bottom:3px;
background:white;
transition:.3s;
border-radius:50%;
}

input:checked + .slider{
background:#2c8f6b;
}

input:checked + .slider:before{
transform:translateX(20px);
}

/* BOTON BORRAR */

.deleteBtn{
margin-left:10px;
background:#444;
color:white;
border:none;
padding:4px 8px;
cursor:pointer;
border-radius:4px;
}

.deleteBtn:hover{
background:#aa3333;
}

/* INPUT NUEVA NOTICIA */

.inputArea{
width:600px;
margin:40px auto;
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:12px;
resize:none;
font-family:sans-serif;
font-size:14px;
background:#2a2a2a;
color:white;
border:1px solid #555;
border-radius:6px;
}

textarea.limit{
border-color:#cc4444;
background:#3a1e1e;
}

.counter{
font-size:12px;
margin-top:6px;
color:#aaa;
}

.counter.warning{
color:#ff5555;
}

.error{
color:#ff4444;
font-size:12px;
margin-top:5px;
display:none;
}

.addBtn{
margin-top:10px;
padding:8px 18px;
background:#2c8f6b;
border:none;
color:white;
cursor:pointer;
border-radius:4px;
}

.addBtn:hover{
background:#38a77f;
}

</style>
</head>

<body>

<div class="version" id="connectionDot"></div>

<div class="container">

<div class="preview">
<iframe src="overlay.html"></iframe>
</div>

<div class="previewButtons">

<button onclick="openOverlay()">Abrir overlay</button>

<button onclick="copyOverlay()">Copiar URL para vMix</button>

</div>

<div class="panel" id="panel"></div>

<div class="inputArea">

<textarea id="newText" maxlength="130"></textarea>

<div class="counter" id="counter">0 / 130</div>

<div class="error" id="errorMsg">límite máximo de caracteres</div>

<button class="addBtn" onclick="addBanner()">Agregar</button>

</div>

</div>

<script>

const ably = new Ably.Realtime("bOKecA.9QsrUQ:0fDP1G0ebCieBR4lo6sS-CwOVg7MJZ6B-vDLgERRGug");

const channel = ably.channels.get("vmix-banner");

const connectionDot=document.getElementById("connectionDot");

ably.connection.on((stateChange)=>{

console.log("Ably state:",stateChange.current);

if(stateChange.current==="connected"){
connectionDot.style.background="#00ff7a";
}

if(stateChange.current==="connecting" || stateChange.current==="disconnected"){
connectionDot.style.background="#ffaa00";
}

if(stateChange.current==="suspended" || stateChange.current==="failed"){
connectionDot.style.background="#ff0033";
}

});

let banners=[

"Registraduría reporta normalidad en apertura de urnas para elecciones 2026",
"Candidatos presidenciales inician jornada de votación en Bogotá",
"Alta participación ciudadana marca primeras horas de elecciones 2026"

];

let activeIndex=null;

function render(){

const panel=document.getElementById("panel");

panel.innerHTML="";

banners.forEach((text,i)=>{

const row=document.createElement("div");
row.className="item";

const switchWrap=document.createElement("label");
switchWrap.className="switch";

const toggle=document.createElement("input");
toggle.type="checkbox";
toggle.checked=(activeIndex===i);

toggle.onchange=()=>toggleBanner(i);

const slider=document.createElement("span");
slider.className="slider";

switchWrap.appendChild(toggle);
switchWrap.appendChild(slider);

const label=document.createElement("span");
label.innerText=text;

const del=document.createElement("button");
del.innerText="Borrar";
del.className="deleteBtn";
del.onclick=()=>deleteBanner(i);

row.appendChild(switchWrap);
row.appendChild(label);
row.appendChild(del);

panel.appendChild(row);

});

}

function toggleBanner(i){

if(activeIndex===i){

channel.publish("banner",{action:"hide"});
activeIndex=null;
render();
return;

}

activeIndex=i;

channel.publish("banner",{
action:"show",
text:banners[i].toUpperCase()
});

render();

}

function deleteBanner(i){

banners.splice(i,1);

if(activeIndex===i){

channel.publish("banner",{action:"hide"});
activeIndex=null;

}

render();

}

function addBanner(){

const input=document.getElementById("newText");

const text=input.value.trim();

if(!text) return;

banners.push(text);

input.value="";

updateCounter();

render();

}

/* CONTADOR */

const textarea=document.getElementById("newText");
const counter=document.getElementById("counter");
const errorMsg=document.getElementById("errorMsg");

textarea.addEventListener("input",updateCounter);

function updateCounter(){

const len=textarea.value.length;

counter.innerText=len+" / 130";

if(len>110){
counter.classList.add("warning");
textarea.classList.add("limit");
}else{
counter.classList.remove("warning");
textarea.classList.remove("limit");
}

if(len>=130){
errorMsg.style.display="block";
}else{
errorMsg.style.display="none";
}

}

function openOverlay(){
window.open("overlay.html","_blank");
}

function copyOverlay(){

const url=location.origin+location.pathname.replace("control.html","overlay.html");

navigator.clipboard.writeText(url);

alert("URL copiada para vMix");

}

render();
updateCounter();

</script>

</body>
</html>
